name: Release
on:
  release:
    types:
      - created

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      ARCH: amd64
      TAG: ${{ github.ref_name }}
    permissions:
      contents: write # Needed to update release with binary assets
      packages: write # Needed for GHCR image push
      id-token: write # needed for the Vault authentication
      attestations: write # needed for attest action
      artifact-metadata: write # needed for attestation upload to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: "Read Vault secrets"
        if: github.repository_owner == 'k3s-io'
        uses: rancher-eio/read-vault-secrets@main
        with:
          secrets: |
            secret/data/github/repo/${{ github.repository }}/dockerhub/rancher/credentials username | DOCKER_USERNAME ;
            secret/data/github/repo/${{ github.repository }}/dockerhub/rancher/credentials password | DOCKER_TOKEN ;
    
      - name: Set DockerHub repo
        if: github.repository_owner != 'k3s-io'
        run: |
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> "$GITHUB_ENV"

      - name: Login to DockerHub with Rancher Secrets
        if: github.repository_owner == 'k3s-io'
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_TOKEN }}

      # For forks, setup DockerHub login with GHA secrets
      - name: Login to DockerHub with GHA Secrets
        if: github.repository_owner != 'k3s-io'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (binaries + image)
        uses: docker/build-push-action@v7
        id: build
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/riscv64
          context: .
          target: multi-arch-package
          outputs: |
            type=local,dest=dist/artifacts
            type=image,push=true
          tags: |
            ${{ env.DOCKER_USERNAME }}/kine:latest
            ${{ env.DOCKER_USERNAME }}/kine:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/kine:latest
            ghcr.io/${{ github.repository_owner }}/kine:${{ github.ref_name }}

      - name: Normalize binary artifacts
        run: |
          mv dist/artifacts/linux_amd64/bin/kine dist/artifacts/kine-amd64
          mv dist/artifacts/linux_arm64/bin/kine dist/artifacts/kine-arm64
          mv dist/artifacts/linux_arm_v7/bin/kine dist/artifacts/kine-arm
          mv dist/artifacts/linux_riscv64/bin/kine dist/artifacts/kine-riscv64
          rm -rf dist/artifacts/linux_*

      - name: Compute checksum for each binary
        run: |
          arch=("amd64" "arm64" "arm" "riscv64")
          cd dist/artifacts
          for a in "${arch[@]}"; do
            sha256sum kine-"${a}" > sha256sum-"${a}".txt
          done
          
      - name: Attest binaries
        uses: actions/attest@v4
        with:
          subject-path: dist/artifacts/kine-*

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist/artifacts/kine-*
            dist/artifacts/*.txt

      - name: Attest images
        uses: actions/attest@v4
        id: attest
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/kine
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
